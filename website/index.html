<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Enso — a terminal for running lots of agents</title>
<meta name="description" content="Enso is a native macOS terminal with vertical tabs and folders, for people who run lots of agents. Built on Ghostty.">
<meta property="og:title" content="Enso">
<meta property="og:description" content="A native macOS terminal with vertical tabs and folders, for people who run lots of agents. Built on Ghostty.">
<meta property="og:url" content="https://enso.sh">
<link rel="icon" type="image/png" href="/favicon.png">
<style>
  @font-face {
    font-family: "Inter Variable";
    src: url("/fonts/InterVariable.woff2") format("woff2");
    font-weight: 100 900;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --ink: #0d0c0b;
    --paper: #e8e4dd;
    --muted: #878178;
    --faint: #4a463f;
    --accent: #d9b8f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { height: 100%; }

  body {
    min-height: 100%;
    font-family: "Inter Variable", system-ui, sans-serif;
    font-optical-sizing: auto;
    background: var(--ink);
    color: var(--paper);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100svh;
    padding: 3rem 1.5rem;
    text-align: center;
    -webkit-font-smoothing: antialiased;
    background-image: radial-gradient(ellipse 90% 60% at 50% 30%, #161219 0%, var(--ink) 70%);
  }

  main {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ——— the app icon ——— */
  .app-icon {
    width: clamp(120px, 20vw, 160px);
    height: auto;
    margin-bottom: 2.5rem;
    filter: drop-shadow(0 18px 44px rgba(217, 184, 240, 0.22));
    opacity: 0;
    scale: 0.86;
    animation: pop .8s cubic-bezier(.2, .9, .3, 1.15) .15s forwards;
  }
  @keyframes pop {
    to { opacity: 1; scale: 1; }
  }

  h1 {
    font-size: clamp(2.6rem, 7vw, 3.4rem);
    font-weight: 470;
    letter-spacing: -0.045em;
    line-height: 1;
  }

  .tagline {
    margin-top: 1.1rem;
    max-width: 24em;
    font-size: clamp(0.95rem, 2.3vw, 1.05rem);
    font-weight: 380;
    letter-spacing: -0.011em;
    line-height: 1.6;
    color: var(--muted);
    text-wrap: balance;
  }
  .cursor {
    display: inline-block;
    width: 0.52em;
    height: 1.05em;
    margin-left: 0.18em;
    vertical-align: text-bottom;
    background: var(--accent);
    animation: blink 1.15s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .actions {
    margin-top: 3rem;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.85rem 1.7rem;
    border-radius: 999px;
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 530;
    letter-spacing: -0.01em;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .btn:active { transform: translateY(0); }
  .btn-primary {
    background: var(--paper);
    color: var(--ink);
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(232, 228, 221, 0.16);
  }
  .btn-secondary {
    color: var(--paper);
    border: 1px solid var(--faint);
  }
  .btn-secondary:hover {
    transform: translateY(-1px);
    border-color: var(--muted);
  }
  .btn svg {
    width: 1.05em;
    height: 1.05em;
    fill: currentColor;
  }

  .meta {
    margin-top: 1.1rem;
    font-size: 0.8rem;
    font-weight: 400;
    color: var(--faint);
    letter-spacing: 0.01em;
  }

  /* staggered reveal */
  h1, .tagline, .actions, .meta {
    opacity: 0;
    translate: 0 10px;
    animation: rise .7s cubic-bezier(.2, .6, .2, 1) forwards;
  }
  h1      { animation-delay: .55s; }
  .tagline{ animation-delay: .70s; }
  .actions{ animation-delay: .85s; }
  .meta   { animation-delay: .95s; }
  @keyframes rise {
    to { opacity: 1; translate: 0 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .app-icon { animation: none; opacity: 1; scale: 1; }
    h1, .tagline, .actions, .meta { animation: none; opacity: 1; translate: none; }
    .cursor { animation: none; }
  }
</style>
</head>
<body>
<main>
  <img class="app-icon" src="/icon-512.png" alt="Enso app icon" width="512" height="512">
  <h1>Enso</h1>
  <p class="tagline">A native macOS terminal with vertical tabs, folders and more. For people who run lots of agents. Built on Ghostty<span class="cursor" aria-hidden="true"></span></p>
  <div class="actions">
    <a class="btn btn-primary" href="https://github.com/amanfromsolan/enso/releases/latest">
      <svg viewBox="0 0 814 1000" aria-hidden="true"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57-155.5-127C46.7 790.7 0 663 0 541.8c0-194.4 126.4-297.5 250.8-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/></svg>
      Download for Mac
    </a>
    <a class="btn btn-secondary" href="https://github.com/amanfromsolan/enso">
      <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      View on GitHub
    </a>
  </div>
  <p class="meta">Latest release · Apple silicon · Free</p>
</main>
</body>
</html>
